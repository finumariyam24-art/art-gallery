<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Art Gallery Display</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center mb-4">Available Art Pieces</h2>
    <div class="row">
      <!-- Art 1 -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm hover-card">
          <img src="art1.jpg" class="card-img-top" alt="Starry Night">
          <div class="card-body">
            <h5 class="card-title">Starry Night</h5>
            <p class="card-text">Vincent van Gogh, 1889</p>
            <a href="art1.html" class="btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
      <!-- Art 2 -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm hover-card">
          <img src="art2.jpg" class="card-img-top" alt="Mona Lisa">
          <div class="card-body">
            <h5 class="card-title">Mona Lisa</h5>
            <p class="card-text">Leonardo da Vinci, 1503</p>
            <a href="art2.html" class="btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
      <!-- Art 3 -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm hover-card">
          <img src="art3.jpg" class="card-img-top" alt="The Persistence of Memory">
          <div class="card-body">
            <h5 class="card-title">The Persistence of Memory</h5>
            <p class="card-text">Salvador Dalí, 1931</p>
            <a href="art3.html" class="btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
      <!-- Art 4 -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm hover-card">
          <img src="art4.jpg" class="card-img-top" alt="The Scream">
          <div class="card-body">
            <h5 class="card-title">The Scream</h5>
            <p class="card-text">Edvard Munch, 1893</p>
            <a href="art4.html" class="btn btn-primary">View Details</a>
                      </div>
        </div>
      </div>
      <!-- Art 5 -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm hover-card">
          <img src="art5.jpg" class="card-img-top" alt="Girl with a Pearl Earring">
          <div class="card-body">
            <h5 class="card-title">Girl with a Pearl Earring</h5>
            <p class="card-text">Johannes Vermeer, 1665</p>
            <a href="art5.html" class="btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
